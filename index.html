<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>PORTAL SEMAK E-SIJIL</title>

<style>

body{
margin:0;
font-family:Arial;
background:url("background.png") center/cover;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.box{
width:90%;
max-width:520px;
padding:30px;
background:rgba(0,0,0,.75);
color:white;
border-radius:20px;
text-align:center;
}

.logo{
width:150px;
}

input{
width:100%;
padding:16px;
margin:15px 0;
border:none;
border-radius:10px;
}

button{
width:100%;
padding:16px;
border:none;
border-radius:10px;
}

.card{
padding:20px;
margin-top:20px;
background:#111;
border-radius:15px;
}

.download{
display:inline-block;
margin-top:10px;
padding:12px 20px;
background:#0af;
color:white;
text-decoration:none;
border-radius:10px;
}

</style>

</head>

<body>

<audio id="successSound">
<source src="success.mp3">
</audio>

<div class="box">

<img src="logo.png" class="logo">

<h2>PORTAL SEMAK E-SIJIL</h2>

<p>MULTI EVENT SYSTEM</p>

<input
id="ic"
placeholder="NO IC">

<button onclick="semak()">
SEMAK SIJIL
</button>

<div id="result"></div>

</div>

<script>

const API =
"https://script.google.com/macros/s/AKfycbz9sjlCziqirzNulFPV3_v54HFs5KFSK188gVVM9CmKBCGewkhN061aNxK6GRf5KYur/exec",

async function semak(){

const result =
document.getElementById(
"result"
);

const ic =
document.getElementById(
"ic"
)
.value
.trim();

if(!ic)return;

result.innerHTML=
`
<div class="card">

MENCARI...

</div>
`;

try{

const event=
new URLSearchParams(
location.search
)
.get("event")
||
"hbn";

const url=
API+
"?event="+
event+
"&ic="+
ic;

const response=
await fetch(url);

const text=
await response.text();

console.log(text);

const data=
JSON.parse(text);

if(
data.success
&&
data.count>0
){

const user=
data.results[0];

document
.getElementById(
"successSound"
)
.play()
.catch(()=>{});

result.innerHTML=
`

<div class="card">

<h2>

${user.nama}

</h2>

<p>

${user.program}

</p>

<p>

${user.event}

</p>

<a
class="download"
href="${user.pdf}"
target="_blank"
>

MUAT TURUN SIJIL

</a>

</div>

`;

}else{

result.innerHTML=
`

<div class="card">

SIJIL TIDAK DIJUMPAI

</div>

`;

}

}catch(err){

console.log(err);

result.innerHTML=
`

<div class="card">

ERROR:

<br><br>

${err}

</div>

`;

}

}

const auto=
new URLSearchParams(
location.search
)
.get("ic");

if(auto){

document
.getElementById(
"ic"
)
.value=
auto;

semak();

}

</script>

</body>
</html>
